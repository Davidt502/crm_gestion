services:
  - type: web
    name: crm-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    rootDir: backend
    envVars:
      - key: DB_SERVER
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: crm-frontend
    runtime: static
    staticPublishPath: frontend
    pullRequestPreviewsEnabled: false
